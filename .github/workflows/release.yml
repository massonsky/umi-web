# ============================================================
# Release workflow для @umi/components
#
# Запуск: вручную через GitHub → Actions → Release → Run workflow
#
# Что делает:
#   1. Собирает библиотеку на Ubuntu / Windows / macOS
#   2. Если все три сборки прошли успешно:
#      - Бампает версию в package.json
#      - Коммитит + пушит в main
#      - Создаёт git-тег (v0.1.1, v0.2.0, ...)
#      - Создаёт GitHub Release с .tgz артефактом
# ============================================================

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Тип bump версии'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch    # 0.1.0 → 0.1.1  (bug fixes)
          - minor    # 0.1.0 → 0.2.0  (new features)
          - major    # 0.1.0 → 1.0.0  (breaking changes)

# ─── Матричная сборка ────────────────────────────────────────
jobs:
  build:
    name: Build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true          # если одна платформа упала — прерываем остальные
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/
          retention-days: 1

# ─── Тег + Релиз ─────────────────────────────────────────────
  release:
    name: Tag & Release
    needs: build                # запускается ТОЛЬКО если все три build прошли
    runs-on: ubuntu-latest
    permissions:
      contents: write           # нужно для push тега + создания Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0        # нужна вся история для корректного тега

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Bump version in package.json
        id: ver
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # npm version возвращает строку вида "v0.1.1"
          NEW_TAG=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          NEW_VER="${NEW_TAG#v}"
          echo "tag=$NEW_TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VER" >> "$GITHUB_OUTPUT"

      # Скачиваем dist, собранный на ubuntu (эталонный артефакт для .tgz)
      - name: Download dist (ubuntu build)
        uses: actions/download-artifact@v4
        with:
          name: dist-ubuntu-latest
          path: dist/

      - name: Pack .tgz
        id: pack
        run: |
          TGZ=$(npm pack 2>&1 | tail -n1)
          echo "file=$TGZ" >> "$GITHUB_OUTPUT"

      - name: Commit & push to main
        run: |
          git add package.json
          git commit -m "chore: release ${{ steps.ver.outputs.tag }}"
          git push origin HEAD:main

      - name: Create & push git tag
        run: |
          git tag ${{ steps.ver.outputs.tag }}
          git push origin ${{ steps.ver.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Release ${{ steps.ver.outputs.tag }}"
          generate_release_notes: true   # авто-changelog из коммитов
          files: ${{ steps.pack.outputs.file }}
          body: |
            ## @umi/components ${{ steps.ver.outputs.tag }}

            ### Установка
            ```bash
            # Из npm (после публикации)
            npm install @umi/components@${{ steps.ver.outputs.version }}

            # Из .tgz файла (прикреплён к релизу)
            npm install ./umi-components-${{ steps.ver.outputs.version }}.tgz
            ```
